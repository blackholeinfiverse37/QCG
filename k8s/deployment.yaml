apiVersion: apps/v1
kind: Deployment
metadata:
  name: qcg-web-server
  labels:
    app: qcg-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: qcg-web
  template:
    metadata:
      labels:
        app: qcg-web
    spec:
      containers:
      - name: qcg-web
        image: qcg-web-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
